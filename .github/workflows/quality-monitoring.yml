name: Quality Monitoring

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run monitoring every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      monitoring_type:
        description: 'Type of monitoring to run'
        required: true
        default: 'full'
        type: choice
        options:
        - full
        - coverage
        - stability
        - dashboard

env:
  GO_VERSION: '1.23'
  COVERAGE_THRESHOLD: 80
  STABILITY_THRESHOLD: 95

jobs:
  quality-monitoring:
    name: Quality Monitoring
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for trend analysis

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Install dependencies
      run: |
        go mod download
        go mod tidy

    - name: Build FlowSpec CLI
      run: make build

    - name: Create monitoring directories
      run: |
        mkdir -p coverage/dashboard
        mkdir -p coverage/reports
        mkdir -p coverage/history

    - name: Run Coverage Analysis
      if: ${{ github.event.inputs.monitoring_type == 'coverage' || github.event.inputs.monitoring_type == 'full' || github.event.inputs.monitoring_type == '' }}
      run: |
        echo "🧪 Running coverage analysis..."
        ./flowspec-cli monitor coverage \
          --output-dir coverage \
          --coverage-threshold ${{ env.COVERAGE_THRESHOLD }} \
          --module-thresholds internal/engine:90 \
          --module-thresholds internal/models:90 \
          --module-thresholds internal/renderer:85 \
          --alerts || echo "Coverage analysis completed with issues"

    - name: Run Stability Analysis
      if: ${{ github.event.inputs.monitoring_type == 'stability' || github.event.inputs.monitoring_type == 'full' || github.event.inputs.monitoring_type == '' }}
      run: |
        echo "🔍 Running stability analysis..."
        ./flowspec-cli monitor stability \
          --output-dir coverage \
          --stability-threshold ${{ env.STABILITY_THRESHOLD }} \
          --flaky-threshold 3 \
          --performance-threshold 2m \
          --alerts || echo "Stability analysis completed with issues"

    - name: Generate Quality Dashboard
      if: ${{ github.event.inputs.monitoring_type == 'dashboard' || github.event.inputs.monitoring_type == 'full' || github.event.inputs.monitoring_type == '' }}
      run: |
        echo "📊 Generating quality dashboard..."
        ./flowspec-cli monitor dashboard \
          --output-dir coverage \
          --refresh-rate 300 \
          --history-days 30

    - name: Upload Coverage Reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: coverage-reports-${{ github.run_number }}
        path: |
          coverage/
          !coverage/node_modules
        retention-days: 30

    - name: Upload Quality Dashboard
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: quality-dashboard-${{ github.run_number }}
        path: |
          coverage/index.html
          coverage/dashboard_data.json
          coverage/static/
        retention-days: 7

    - name: Parse Coverage Results
      id: coverage
      if: always()
      run: |
        if [ -f "coverage/coverage.json" ]; then
          COVERAGE=$(jq -r '.overallCoverage' coverage/coverage.json)
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "Coverage: $COVERAGE%"
        else
          echo "coverage=0" >> $GITHUB_OUTPUT
          echo "Coverage data not available"
        fi

    - name: Parse Stability Results
      id: stability
      if: always()
      run: |
        if [ -f "coverage/stability_report.json" ]; then
          STABILITY=$(jq -r '.stabilityMetrics.overallStability' coverage/stability_report.json)
          FLAKY_TESTS=$(jq -r '.flakyTests | length' coverage/stability_report.json)
          echo "stability=$STABILITY" >> $GITHUB_OUTPUT
          echo "flaky_tests=$FLAKY_TESTS" >> $GITHUB_OUTPUT
          echo "Stability: $STABILITY%"
          echo "Flaky Tests: $FLAKY_TESTS"
        else
          echo "stability=0" >> $GITHUB_OUTPUT
          echo "flaky_tests=0" >> $GITHUB_OUTPUT
          echo "Stability data not available"
        fi

    - name: Quality Gate Check
      if: always()
      run: |
        COVERAGE="${{ steps.coverage.outputs.coverage }}"
        STABILITY="${{ steps.stability.outputs.stability }}"
        FLAKY_TESTS="${{ steps.stability.outputs.flaky_tests }}"
        
        echo "🚪 Quality Gate Check"
        echo "===================="
        echo "Coverage: $COVERAGE% (threshold: ${{ env.COVERAGE_THRESHOLD }}%)"
        echo "Stability: $STABILITY% (threshold: ${{ env.STABILITY_THRESHOLD }}%)"
        echo "Flaky Tests: $FLAKY_TESTS"
        
        QUALITY_GATE_PASSED=true
        
        # Check coverage threshold
        if (( $(echo "$COVERAGE < ${{ env.COVERAGE_THRESHOLD }}" | bc -l) )); then
          echo "❌ Coverage $COVERAGE% below threshold ${{ env.COVERAGE_THRESHOLD }}%"
          QUALITY_GATE_PASSED=false
        else
          echo "✅ Coverage threshold met"
        fi
        
        # Check stability threshold
        if (( $(echo "$STABILITY < ${{ env.STABILITY_THRESHOLD }}" | bc -l) )); then
          echo "❌ Stability $STABILITY% below threshold ${{ env.STABILITY_THRESHOLD }}%"
          QUALITY_GATE_PASSED=false
        else
          echo "✅ Stability threshold met"
        fi
        
        # Check flaky tests
        if [ "$FLAKY_TESTS" -gt 5 ]; then
          echo "⚠️  Warning: $FLAKY_TESTS flaky tests detected"
        fi
        
        if [ "$QUALITY_GATE_PASSED" = true ]; then
          echo "✅ Quality gate PASSED"
        else
          echo "❌ Quality gate FAILED"
          exit 1
        fi

    - name: Comment PR with Quality Report
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          
          let coverage = '${{ steps.coverage.outputs.coverage }}';
          let stability = '${{ steps.stability.outputs.stability }}';
          let flakyTests = '${{ steps.stability.outputs.flaky_tests }}';
          
          // Read detailed reports if available
          let coverageDetails = '';
          let stabilityDetails = '';
          
          try {
            if (fs.existsSync('coverage/coverage.json')) {
              const coverageData = JSON.parse(fs.readFileSync('coverage/coverage.json', 'utf8'));
              const qualityGate = coverageData.qualityGate.passed ? '✅ Passed' : '❌ Failed';
              coverageDetails = `
          **Coverage Details:**
          - Overall: ${coverage}%
          - Quality Gate: ${qualityGate}
          - Trend: ${coverageData.trends.direction}
              `;
            }
          } catch (e) {
            console.log('Could not read coverage details:', e.message);
          }
          
          try {
            if (fs.existsSync('coverage/stability_report.json')) {
              const stabilityData = JSON.parse(fs.readFileSync('coverage/stability_report.json', 'utf8'));
              const avgDuration = stabilityData.performanceData.averageDuration;
              stabilityDetails = `
          **Stability Details:**
          - Overall: ${stability}%
          - Flaky Tests: ${flakyTests}
          - Avg Duration: ${avgDuration}
          - Trend: ${stabilityData.stabilityMetrics.stabilityTrend}
              `;
            }
          } catch (e) {
            console.log('Could not read stability details:', e.message);
          }
          
          const qualityStatus = (parseFloat(coverage) >= ${{ env.COVERAGE_THRESHOLD }} && parseFloat(stability) >= ${{ env.STABILITY_THRESHOLD }}) ? '✅ PASSED' : '❌ FAILED';
          
          const comment = `## 📊 Quality Monitoring Report
          
          **Quality Gate: ${qualityStatus}**
          
          | Metric | Value | Threshold | Status |
          |--------|-------|-----------|--------|
          | Coverage | ${coverage}% | ${{ env.COVERAGE_THRESHOLD }}% | ${parseFloat(coverage) >= ${{ env.COVERAGE_THRESHOLD }} ? '✅' : '❌'} |
          | Stability | ${stability}% | ${{ env.STABILITY_THRESHOLD }}% | ${parseFloat(stability) >= ${{ env.STABILITY_THRESHOLD }} ? '✅' : '❌'} |
          | Flaky Tests | ${flakyTests} | ≤ 5 | ${parseInt(flakyTests) <= 5 ? '✅' : '⚠️'} |
          
          ${coverageDetails}
          ${stabilityDetails}
          
          📈 **Dashboard:** Check the uploaded artifacts for the complete quality dashboard.
          
          ---
          *Generated by Quality Monitoring workflow*`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

    - name: Create Quality Badge
      if: github.ref == 'refs/heads/main' && always()
      run: |
        COVERAGE="${{ steps.coverage.outputs.coverage }}"
        STABILITY="${{ steps.stability.outputs.stability }}"
        
        # Calculate overall quality score (weighted average)
        QUALITY_SCORE=$(echo "scale=1; ($COVERAGE * 0.6) + ($STABILITY * 0.4)" | bc)
        
        # Determine badge color
        if (( $(echo "$QUALITY_SCORE >= 90" | bc -l) )); then
          COLOR="brightgreen"
        elif (( $(echo "$QUALITY_SCORE >= 80" | bc -l) )); then
          COLOR="green"
        elif (( $(echo "$QUALITY_SCORE >= 70" | bc -l) )); then
          COLOR="yellow"
        elif (( $(echo "$QUALITY_SCORE >= 60" | bc -l) )); then
          COLOR="orange"
        else
          COLOR="red"
        fi
        
        echo "Quality Score: $QUALITY_SCORE% (Color: $COLOR)"
        
        # Create badge data
        mkdir -p badges
        echo "{\"schemaVersion\": 1, \"label\": \"quality\", \"message\": \"${QUALITY_SCORE}%\", \"color\": \"${COLOR}\"}" > badges/quality.json
        echo "{\"schemaVersion\": 1, \"label\": \"coverage\", \"message\": \"${COVERAGE}%\", \"color\": \"$([ $(echo "$COVERAGE >= 80" | bc -l) -eq 1 ] && echo "green" || echo "red")\"}" > badges/coverage.json
        echo "{\"schemaVersion\": 1, \"label\": \"stability\", \"message\": \"${STABILITY}%\", \"color\": \"$([ $(echo "$STABILITY >= 95" | bc -l) -eq 1 ] && echo "green" || echo "red")\"}" > badges/stability.json

    - name: Upload Quality Badges
      if: github.ref == 'refs/heads/main' && always()
      uses: actions/upload-artifact@v3
      with:
        name: quality-badges
        path: badges/
        retention-days: 1

    - name: Notify on Quality Degradation
      if: failure() && (github.event_name == 'push' || github.event_name == 'schedule')
      uses: actions/github-script@v6
      with:
        script: |
          const coverage = '${{ steps.coverage.outputs.coverage }}';
          const stability = '${{ steps.stability.outputs.stability }}';
          
          const title = '🚨 Quality Gate Failed';
          const body = `Quality monitoring detected issues:
          
          - Coverage: ${coverage}% (threshold: ${{ env.COVERAGE_THRESHOLD }}%)
          - Stability: ${stability}% (threshold: ${{ env.STABILITY_THRESHOLD }}%)
          
          Please review the quality dashboard and address the issues.
          
          **Workflow:** ${{ github.workflow }}
          **Run:** ${{ github.run_number }}
          **Commit:** ${{ github.sha }}`;
          
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: title,
            body: body,
            labels: ['quality', 'monitoring', 'urgent']
          });

  deploy-dashboard:
    name: Deploy Quality Dashboard
    runs-on: ubuntu-latest
    needs: quality-monitoring
    if: github.ref == 'refs/heads/main' && always()
    
    steps:
    - name: Download Quality Dashboard
      uses: actions/download-artifact@v3
      with:
        name: quality-dashboard-${{ github.run_number }}
        path: dashboard/

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dashboard
        destination_dir: quality-dashboard
        keep_files: false
        commit_message: 'Deploy quality dashboard ${{ github.run_number }}'

    - name: Comment with Dashboard Link
      if: github.event_name == 'push'
      uses: actions/github-script@v6
      with:
        script: |
          const dashboardUrl = `https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/quality-dashboard/`;
          
          github.rest.repos.createCommitComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            commit_sha: context.sha,
            body: `📊 Quality Dashboard updated: ${dashboardUrl}`
          });